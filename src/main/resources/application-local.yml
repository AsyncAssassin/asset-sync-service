spring:
  datasource:
    url: jdbc:postgresql://${ASSET_SYNC_DB_HOST:localhost}:${ASSET_SYNC_DB_PORT:5432}/${ASSET_SYNC_DB_NAME:asset_sync}
    username: ${ASSET_SYNC_DB_USER:asset_sync}
    password: ${ASSET_SYNC_DB_PASSWORD:asset_sync}
    hikari:
      maximum-pool-size: ${ASSET_SYNC_DB_MAX_POOL_SIZE:10}
      minimum-idle: ${ASSET_SYNC_DB_MIN_IDLE:1}
      pool-name: asset-sync-hikari
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yaml
